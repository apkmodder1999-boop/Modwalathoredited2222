<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PW THOR - Premium Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #ffffff; }
        
        header { background: linear-gradient(135deg, #111827, #1f2937); padding: 20px; text-align: center; border-bottom: 2px solid #ef4444; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2); }
        .logo-area h1 { font-size: 2.5rem; font-weight: 800; color: #ffffff; }
        .logo-area span { color: #ef4444; }

        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .welcome-text { margin-bottom: 30px; font-size: 1.2rem; color: #9ca3af; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .card h3 { font-size: 1.4rem; margin-bottom: 15px; }
        .card p { color: #9ca3af; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }

        .btn { display: inline-block; width: 100%; padding: 12px 24px; font-size: 1rem; font-weight: 600; text-decoration: none; border-radius: 8px; cursor: pointer; border: none; text-align: center; transition: background 0.2s; }
        .btn-primary { background-color: #ef4444; color: white; }
        .btn-primary:hover { background-color: #dc2626; }
        .btn-secondary { background-color: #2563eb; color: white; }
        .btn-secondary:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>PW <span>THOR</span></h1>
        </div>
    </header>

    <div class="main-container">
        <p class="welcome-text">Select your operation terminal:</p>

        <div class="grid-layout">
            
            <div class="card">
                <div>
                    <h3>Enrolled Batches</h3>
                    <p>Access your personal course portal panel securely through verified sessions.</p>
                </div>
                <button class="btn btn-primary" onclick="launchSecureSession('auth')">Access Batches</button>
            </div>

            <div class="card">
                <div>
                    <h3>Request Enrollment</h3>
                    <p>Connect directly with our verification bot to manage or buy new active courses.</p>
                </div>
                <button class="btn btn-secondary" onclick="launchSecureSession('bot')">Open Enrollment Bot</button>
            </div>

        </div>
    </div>

    <script>
        const targetTelegramMain = "https://t.me/+SDQNy0c8-p1iNDBl";
        const sellerBotLink = "https://t.me/seller_connector_bot";

        function launchSecureSession(type) {
            if (type === 'bot') {
                window.open(sellerBotLink, '_blank');
                return;
            }

            // Kyuki normal browsers Iframe ke andar routing data read nahi karne dete (CORS block)
            // Isliye hum direct safe navigation pass system use kar rahe hain
            if (type === 'auth') {
                // User direct target verification sequence par jayega bina layout leaks ke
                window.open("https://pwthor.live/auth", '_blank');
            }
        }

        // URL validation interceptor routine for handling deep incoming path requests to your domain
        function checkIncomingPathRedirection() {
            const currentPath = window.location.pathname.toLowerCase();
            
            if (currentPath.includes("study/batches")) {
                window.location.href = sellerBotLink;
            } else if (currentPath.includes("contact") || currentPath.includes("study/donate")) {
                window.location.href = targetTelegramMain;
            }
        }

        // Execute routing validation loop on window lifecycle state trigger
        window.onload = checkIncomingPathRedirection;
    </script>
</body>
</html>
